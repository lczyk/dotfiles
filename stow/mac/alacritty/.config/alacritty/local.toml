[font]
size = 20.0

[font.normal]
family = "DejaVuSansM Nerd Font Mono"
style = "Regular"

[font.bold]
family = "DejaVuSansM Nerd Font Mono"
style = "Bold"

[font.italic]
family = "DejaVuSansM Nerd Font Mono"
style = "Oblique"

[font.bold_italic]
family = "DejaVuSansM Nerd Font Mono"
style = "Bold Oblique"

[font.offset]
x = 0
y = 1

[window]
opacity = 0.9
decorations = "buttonless"
# treat option as alt so option+letter / option+backspace carry alt mod into apps.
option_as_alt = "Both"

[[keyboard.bindings]]
key = "N"
mods = "Command"
action = "CreateNewWindow"

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"

# option_as_alt = "Both" eats option+3, which is how macos types `#`.
# rebind it back explicitly. add more glyphs here if other option-composed
# chars start going missing.
[[keyboard.bindings]]
key = "Key3"
mods = "Alt"
chars = "#"

# cmd+s -> kitty CSI-u with Super modifier (param 9 = 1 + bit3-Super).
# editor parses as genuine Cmd+S and matches its Save chord.
[[keyboard.bindings]]
key = "S"
mods = "Command"
chars = "\u001B[115;9u"

# cmd+f -> send ctrl+f (0x06) to running program instead of alacritty's
# built-in SearchForward. lets `edit` receive its find chord on macos.
[[keyboard.bindings]]
key = "F"
mods = "Command"
chars = "\u0006"

# cmd+c split per screen mode:
#   alt screen (TUI apps like `edit`) -> forward to program.
#   normal screen (shell)             -> default Copy.
# defining the user binding shadows default for both modes, so normal-screen
# behaviour has to be re-registered explicitly.
[[keyboard.bindings]]
key = "C"
mods = "Command"
mode = "Alt"
action = "ReceiveChar"

[[keyboard.bindings]]
key = "C"
mods = "Command"
mode = "~Alt"
action = "Copy"

# shift+left-click default in alacritty is PasteSelection (paste PRIMARY).
# scope the default to the normal screen only -- in alt screen (TUI apps
# like `edit`) the event must pass through so apps can extend-selection-to-
# click. mode `~Alt` matches "not alt screen".
[[mouse.bindings]]
mouse = "Left"
mods = "Shift"
mode = "~Alt"
action = "PasteSelection"
